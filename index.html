<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <h1>Expense &amp; Budget Visualizer</h1>
    <div class="header-right">
      <button id="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
      <div id="total-balance">Total: $0.00</div>
    </div>
  </header>

  <main>
    <section id="form-section">
      <form id="transaction-form">
        <h2>Add Transaction</h2>
        <label for="item-name">Item Name</label>
        <input id="item-name" type="text" maxlength="100" placeholder="Enter item name" autocomplete="off" />

        <label for="item-amount">Amount</label>
        <input id="item-amount" type="number" step="0.01" min="0.01" placeholder="e.g. 14.00" />

        <label for="item-category">Category</label>
        <select id="item-category" required>
          <option value="" disabled selected>Select a category</option>
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Fun">Fun</option>
        </select>

        <button type="submit">Add Transaction</button>
      </form>
      <div id="form-errors" aria-live="polite"></div>
    </section>

    <section id="chart-section">
      <h2>Spending by Category</h2>
      <canvas id="pie-chart" width="300" height="300"></canvas>
      <div id="chart-placeholder" hidden>No spending data to display.</div>
    </section>

    <section id="list-section">
      <div id="list-header">
        <h2>Transactions List</h2>
        <select id="sort-select" aria-label="Sort transactions">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
          <option value="amount-desc">Amount: High to Low</option>
          <option value="amount-asc">Amount: Low to High</option>
        </select>
      </div>
      <ul id="transaction-list" aria-label="Transaction list"></ul>
      <p id="list-placeholder">No transactions yet.</p>
</section>
  </main>

  <div id="error-banner" role="alert" aria-live="assertive" hidden></div>
  <script src="js/app.js"></script>
</body>
</html>
